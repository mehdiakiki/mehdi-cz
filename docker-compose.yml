version: '3.8'

services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FORMSPREE_KEY=${NEXT_PUBLIC_FORMSPREE_KEY}
        - NEXT_PUBLIC_GISCUS_REPO=${NEXT_PUBLIC_GISCUS_REPO:-}
        - NEXT_PUBLIC_GISCUS_REPOSITORY_ID=${NEXT_PUBLIC_GISCUS_REPOSITORY_ID:-}
        - NEXT_PUBLIC_GISCUS_CATEGORY=${NEXT_PUBLIC_GISCUS_CATEGORY:-}
        - NEXT_PUBLIC_GISCUS_CATEGORY_ID=${NEXT_PUBLIC_GISCUS_CATEGORY_ID:-}
    container_name: mehdi-blog
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Load from .env file
      - BUTTONDOWN_API_KEY=${BUTTONDOWN_API_KEY}
      - NEXT_PUBLIC_FORMSPREE_KEY=${NEXT_PUBLIC_FORMSPREE_KEY}
      - NEXT_UMAMI_ID=${NEXT_UMAMI_ID:-}
      - NEXT_PUBLIC_GISCUS_REPO=${NEXT_PUBLIC_GISCUS_REPO:-}
      - NEXT_PUBLIC_GISCUS_REPOSITORY_ID=${NEXT_PUBLIC_GISCUS_REPOSITORY_ID:-}
      - NEXT_PUBLIC_GISCUS_CATEGORY=${NEXT_PUBLIC_GISCUS_CATEGORY:-}
      - NEXT_PUBLIC_GISCUS_CATEGORY_ID=${NEXT_PUBLIC_GISCUS_CATEGORY_ID:-}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PLAYGROUND_SECRET=${PLAYGROUND_SECRET}
      - PLAYGROUND_AXUM_URL=http://code-playground:3001
      - NEXT_PUBLIC_SITE_URL=https://mehdi.cz
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blog-network

  code-playground:
    build:
      context: ./js_go_rust_playground/code-playground
      dockerfile: Dockerfile
    container_name: code-playground
    restart: unless-stopped
    # No public port — only reachable from blog container on the internal network.
    environment:
      - PORT=3001
      - RUST_LOG=code_playground=info,tower_http=info
      - PLAYGROUND_SECRET=${PLAYGROUND_SECRET}
      - ALLOWED_ORIGINS=https://mehdi.cz
      - RATE_LIMIT_RPM=10
      - CACHE_TTL_SECS=3600
      - CACHE_PATH=/data/cache.json
      - MIN_SIMILARITY=0.3
      - JS_TIMEOUT_MS=5000
      - MAX_CONCURRENT=4
      - MAX_OUTPUT_BYTES=65536
      - CB_FAILURE_THRESHOLD=3
      - CB_COOLDOWN_SECS=60
    volumes:
      - playground-cache:/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/playground/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - blog-network

volumes:
  playground-cache:

networks:
  blog-network:
    driver: bridge
