# ==============================================================
# Add this to your existing docker-compose.yml under services:
# ==============================================================

  code-playground:
    build:
      context: ./code-playground
      dockerfile: Dockerfile
    # NO ports: — Axum must never be reachable from the public internet.
    # Next.js proxies to it internally via PLAYGROUND_AXUM_URL.
    environment:
      - PORT=3001
      - RUST_LOG=code_playground=info,tower_http=info
      # ⚠ CHANGE THESE IN PRODUCTION:
      - PLAYGROUND_SECRET=${PLAYGROUND_SECRET}    # same value in Next.js .env
      - ALLOWED_ORIGINS=https://yourdomain.com    # your actual domain
      - RATE_LIMIT_RPM=10
      - CACHE_TTL_SECS=3600
      - CACHE_PATH=/data/cache.json
      - MIN_SIMILARITY=0.3
      - JS_TIMEOUT_MS=5000
      - MAX_CONCURRENT=4
      - MAX_OUTPUT_BYTES=65536
      - CB_FAILURE_THRESHOLD=3
      - CB_COOLDOWN_SECS=60
      # OpenTelemetry — set to your collector endpoint to enable traces + metrics.
      # Omit or leave empty to use stdout logging only.
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      # Persistent cache — survives container restarts.
      # On first boot, the service warms the cache from play.rust-lang.org.
      # On subsequent boots, it loads from this file instantly.
      - playground-cache:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
    networks:
      - default

volumes:
  playground-cache:

# ==============================================================
# Your Next.js service also needs these env vars:
# ==============================================================
#
#   web:
#     build: .
#     environment:
#       - PLAYGROUND_SECRET=${PLAYGROUND_SECRET}
#       - PLAYGROUND_AXUM_URL=http://code-playground:3001
#       - NEXT_PUBLIC_SITE_URL=https://yourdomain.com
#
# And in your .env file:
#
#   PLAYGROUND_SECRET=<generate with: openssl rand -hex 32>
#
# Signing happens inside the Next.js /api/playground/execute route —
# the browser never sees the secret and /sign is not a public endpoint.
#
# ==============================================================
